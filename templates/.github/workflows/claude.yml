name: Claude Code

on:
  issues:
    types: [opened, labeled]

jobs:
  claude:
    if: contains(github.event.issue.labels.*.name, 'claude')
    runs-on: ubuntu-latest
    steps:
      - uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
